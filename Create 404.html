<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | KWĒN</title>
<meta name="robots" content="noindex">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { font-family: 'Poppins', sans-serif; }
  .font-display { font-family: 'Playfair Display', serif; }
  body { overflow-x: hidden; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fadeUp { animation: fadeUp 0.7s ease forwards; }
  .delay-1 { animation-delay: 0.15s; opacity: 0; animation-fill-mode: forwards; }
  .delay-2 { animation-delay: 0.3s; opacity: 0; animation-fill-mode: forwards; }
  .delay-3 { animation-delay: 0.45s; opacity: 0; animation-fill-mode: forwards; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(3deg); }
  }
  .animate-float { animation: float 4s ease-in-out infinite; }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .shimmer-text {
    background: linear-gradient(90deg, #000 0%, #f5d6dd 25%, #000 50%, #d9d3f0 75%, #000 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 5s linear infinite;
  }
</style>
</head>
<body class="bg-[#faf7f2] text-black">

<!-- ============ MINIMAL NAVBAR ============ -->
<nav class="w-full bg-[#faf7f2]/95 backdrop-blur-md border-b border-black/5">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-center">
    <a href="index.html" class="font-display text-2xl font-bold tracking-widest">KWĒN</a>
  </div>
</nav>

<!-- ============ 404 SECTION ============ -->
<section class="relative min-h-[80vh] flex items-center justify-center px-6 py-20 overflow-hidden bg-gradient-to-br from-[#faf7f2] via-[#f5d6dd]/20 to-[#d9d3f0]/30">

  <!-- Floating decor -->
  <div class="absolute top-20 left-12 w-24 h-24 rounded-full bg-[#f5d6dd]/50 blur-xl animate-float"></div>
  <div class="absolute bottom-24 right-16 w-32 h-32 rounded-full bg-[#d9d3f0]/50 blur-xl animate-float" style="animation-delay:1s;"></div>

  <div class="max-w-lg w-full text-center relative z-10">
    <h1 class="font-display text-8xl md:text-9xl font-bold shimmer-text animate-fadeUp mb-2">404</h1>

    <p class="uppercase tracking-[0.3em] text-xs text-black/50 mb-4 animate-fadeUp delay-1">Oops, Look Away</p>
    <h2 class="font-display text-2xl md:text-3xl font-bold mb-4 animate-fadeUp delay-1">This Page Went Off-Runway</h2>
    <p class="text-black/60 text-sm md:text-base mb-10 animate-fadeUp delay-2">
      The page you're looking for doesn't exist or may have been moved. Let's get you back to something stylish.
    </p>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 animate-fadeUp delay-3">
      <a href="index.html" class="px-8 py-3 bg-black text-white rounded-full uppercase text-sm tracking-widest hover:bg-black/80 transition-all hover:scale-105">
        Back to Home
      </a>
      <a href="shop.html" class="px-8 py-3 border border-black rounded-full uppercase text-sm tracking-widest hover:bg-black hover:text-white transition-all hover:scale-105">
        Continue Shopping
      </a>
    </div>

    <div class="mt-10 animate-fadeUp delay-3">
      <input type="text" placeholder="Search for products..." class="w-full max-w-xs mx-auto px-5 py-3 rounded-full border border-black/20 bg-white text-sm text-center focus:outline-none focus:border-black transition-colors">
    </div>
  </div>
</section>

</body>
</html>
