<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | KWĒN</title>
<meta name="description" content="Create your KWĒN account for faster checkout, order tracking, and exclusive offers.">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { font-family: 'Poppins', sans-serif; }
  .font-display { font-family: 'Playfair Display', serif; }
  body { overflow-x: hidden; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fadeUp { animation: fadeUp 0.7s ease forwards; }
  .delay-1 { animation-delay: 0.1s; opacity: 0; animation-fill-mode: forwards; }
  .delay-2 { animation-delay: 0.2s; opacity: 0; animation-fill-mode: forwards; }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
  }
  .animate-float { animation: float 5s ease-in-out infinite; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.4s ease; }

  /* Password strength bar */
  .strength-bar {
    height: 4px;
    border-radius: 2px;
    transition: all 0.3s ease;
    background: #00000015;
  }
  .strength-bar.weak { background: #ef4444; }
  .strength-bar.medium { background: #f59e0b; }
  .strength-bar.strong { background: #22c55e; }
</style>
</head>
<body class="bg-[#faf7f2] text-black min-h-screen">

<!-- ============ MINIMAL NAVBAR ============ -->
<nav class="w-full bg-[#faf7f2]/95 backdrop-blur-md border-b border-black/5">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-center">
    <a href="index.html" class="font-display text-2xl font-bold tracking-widest">KWĒN</a>
  </div>
</nav>

<!-- ============ SIGNUP SPLIT LAYOUT ============ -->
<section class="min-h-[calc(100vh-73px)] grid grid-cols-1 lg:grid-cols-2">

  <!-- Left: Visual panel -->
  <div class="hidden lg:flex relative bg-gradient-to-br from-[#d9d3f0]/50 via-[#faf7f2] to-[#f5d6dd]/40 items-center justify-center overflow-hidden">
    <div class="absolute top-24 right-16 w-28 h-28 rounded-full bg-[#d9d3f0]/50 blur-xl animate-float"></div>
    <div class="absolute bottom-20 left-20 w-24 h-24 rounded-full bg-[#f5d6dd]/50 blur-xl animate-float" style="animation-delay:1s;"></div>
    <div class="relative z-10 text-center px-10 animate-fadeUp">
      <img src="https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=650&q=80" alt="KWĒN collection" class="max-w-sm rounded-3xl shadow-2xl mb-8 mx-auto">
      <h2 class="font-display text-2xl font-bold mb-2">Join The KWĒN Circle</h2>
      <p class="text-black/60 text-sm max-w-xs mx-auto">Unlock member-only drops, faster checkout, and reward points on every order.</p>
    </div>
  </div>

  <!-- Right: Signup form -->
  <div class="flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-sm">

      <div class="mb-8 animate-fadeUp">
        <h1 class="font-display text-3xl font-bold mb-2">Create Your Account</h1>
        <p class="text-black/60 text-sm">Join for free and start your Korean fashion journey.</p>
      </div>

      <!-- Social signup -->
      <div class="space-y-3 mb-6 animate-fadeUp delay-1">
        <button class="w-full flex items-center justify-center gap-3 border border-black/20 rounded-full py-3 text-sm hover:bg-black/5 transition">
          <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
      </div>

      <div class="flex items-center gap-3 mb-6 animate-fadeUp delay-1">
        <div class="flex-1 h-px bg-black/10"></div>
        <span class="text-xs text-black/40">OR</span>
        <div class="flex-1 h-px bg-black/10"></div>
      </div>

      <!-- Signup form -->
      <form id="signupForm" class="space-y-4 animate-fadeUp delay-2">
        <div>
          <label class="text-xs uppercase tracking-widest text-black/50 mb-2 block">Full Name</label>
          <input type="text" id="signupName" required placeholder="Jane Doe" class="w-full px-4 py-3 rounded-xl border border-black/20 text-sm focus:outline-none focus:border-black transition-colors">
        </div>

        <div>
          <label class="text-xs uppercase tracking-widest text-black/50 mb-2 block">Email</label>
          <input type="email" id="signupEmail" required placeholder="you@example.com" class="w-full px-4 py-3 rounded-xl border border-black/20 text-sm focus:outline-none focus:border-black transition-colors">
        </div>

        <div>
          <label class="text-xs uppercase tracking-widest text-black/50 mb-2 block">Phone Number</label>
          <input type="tel" id="signupPhone" required placeholder="+91 98765 43210" class="w-full px-4 py-3 rounded-xl border border-black/20 text-sm focus:outline-none focus:border-black transition-colors">
        </div>

        <div>
          <label class="text-xs uppercase tracking-widest text-black/50 mb-2 block">Password</label>
          <input type="password" id="signupPassword" required placeholder="Create a password" class="w-full px-4 py-3 rounded-xl border border-black/20 text-sm focus:outline-none focus:border-black transition-colors">
          <div class="grid grid-cols-3 gap-2 mt-2">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
          </div>
          <p class="text-xs text-black/40 mt-1" id="strengthText">Use 8+ characters with letters & numbers</p>
        </div>

        <p id="signupError" class="text-xs text-red-500 hidden">Please fill all fields correctly.</p>

        <label class="flex items-start gap-2 text-sm cursor-pointer">
          <input type="checkbox" required class="w-4 h-4 mt-0.5">
          <span>I agree to the <a href="#" class="underline">Terms & Conditions</a> and <a href="#" class="underline">Privacy Policy</a></span>
        </label>

        <button type="submit" class="w-full bg-black text-white rounded-full py-3.5 uppercase text-sm tracking-widest hover:bg-black/80 transition-all hover:scale-[1.02]">
          Create Account
        </button>
      </form>

      <p class="text-center text-sm text-black/60 mt-8 animate-fadeUp delay-2">
        Already have an account? <a href="login.html" class="underline font-medium text-black">Log in</a>
      </p>
    </div>
  </div>
</section>

<script>
  // Password strength checker
  const signupPassword = document.getElementById('signupPassword');
  const bar1 = document.getElementById('bar1');
  const bar2 = document.getElementById('bar2');
  const bar3 = document.getElementById('bar3');
  const strengthText = document.getElementById('strengthText');

  signupPassword.addEventListener('input', () => {
    const val = signupPassword.value;
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val) && val.length >= 10) score++;

    [bar1, bar2, bar3].forEach(bar => bar.className = 'strength-bar');

    if (val.length === 0) {
      strengthText.textContent = 'Use 8+ characters with letters & numbers';
      strengthText.className = 'text-xs text-black/40 mt-1';
    } else if (score <= 1) {
      bar1.classList.add('weak');
      strengthText.textContent = 'Weak password';
      strengthText.className = 'text-xs text-red-500 mt-1';
    } else if (score === 2) {
      bar1.classList.add('medium'); bar2.classList.add('medium');
      strengthText.textContent = 'Medium strength';
      strengthText.className = 'text-xs text-amber-500 mt-1';
    } else {
      bar1.classList.add('strong'); bar2.classList.add('strong'); bar3.classList.add('strong');
      strengthText.textContent = 'Strong password';
      strengthText.className = 'text-xs text-green-600 mt-1';
    }
  });

  // Signup form validation (demo)
  const signupForm = document.getElementById('signupForm');
  const signupError = document.getElementById('signupError');

  signupForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;

    if (!name || !email.includes('@') || password.length < 6) {
      signupError.classList.remove('hidden');
      signupForm.classList.add('shake');
      setTimeout(() => signupForm.classList.remove('shake'), 400);
      return;
    }

    signupError.classList.add('hidden');
    // In production, this would call your auth API (NextAuth/Auth.js) to create the account
    window.location.href = 'login.html';
  });
</script>

</body>
</html>
