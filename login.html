<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | KWĒN</title>
<meta name="description" content="Log in to your KWĒN account to track orders, manage your wishlist, and more.">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { font-family: 'Poppins', sans-serif; }
  .font-display { font-family: 'Playfair Display', serif; }
  body { overflow-x: hidden; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fadeUp { animation: fadeUp 0.7s ease forwards; }
  .delay-1 { animation-delay: 0.1s; opacity: 0; animation-fill-mode: forwards; }
  .delay-2 { animation-delay: 0.2s; opacity: 0; animation-fill-mode: forwards; }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
  }
  .animate-float { animation: float 5s ease-in-out infinite; }

  /* Input shake on error */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.4s ease; }

  /* Password toggle icon */
  .eye-icon { cursor: pointer; }
</style>
</head>
<body class="bg-[#faf7f2] text-black min-h-screen">

<!-- ============ MINIMAL NAVBAR ============ -->
<nav class="w-full bg-[#faf7f2]/95 backdrop-blur-md border-b border-black/5">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-center">
    <a href="index.html" class="font-display text-2xl font-bold tracking-widest">KWĒN</a>
  </div>
</nav>

<!-- ============ LOGIN SPLIT LAYOUT ============ -->
<section class="min-h-[calc(100vh-73px)] grid grid-cols-1 lg:grid-cols-2">

  <!-- Left: Visual panel -->
  <div class="hidden lg:flex relative bg-gradient-to-br from-[#f5d6dd]/40 via-[#faf7f2] to-[#d9d3f0]/50 items-center justify-center overflow-hidden">
    <div class="absolute top-20 left-16 w-24 h-24 rounded-full bg-[#f5d6dd]/50 blur-xl animate-float"></div>
    <div class="absolute bottom-24 right-20 w-32 h-32 rounded-full bg-[#d9d3f0]/50 blur-xl animate-float" style="animation-delay:1.5s;"></div>
    <img src="https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=700&q=80" alt="KWĒN party wear" class="max-w-sm rounded-3xl shadow-2xl relative z-10 animate-fadeUp">
  </div>

  <!-- Right: Login form -->
  <div class="flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-sm">

      <div class="mb-8 animate-fadeUp">
        <h1 class="font-display text-3xl font-bold mb-2">Welcome Back</h1>
        <p class="text-black/60 text-sm">Log in to continue your KWĒN journey.</p>
      </div>

      <!-- Social logins -->
      <div class="space-y-3 mb-6 animate-fadeUp delay-1">
        <button class="w-full flex items-center justify-center gap-3 border border-black/20 rounded-full py-3 text-sm hover:bg-black/5 transition">
          <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
      </div>

      <div class="flex items-center gap-3 mb-6 animate-fadeUp delay-1">
        <div class="flex-1 h-px bg-black/10"></div>
        <span class="text-xs text-black/40">OR</span>
        <div class="flex-1 h-px bg-black/10"></div>
      </div>

      <!-- Login form -->
      <form id="loginForm" class="space-y-4 animate-fadeUp delay-2">
        <div>
          <label class="text-xs uppercase tracking-widest text-black/50 mb-2 block">Email</label>
          <input type="email" id="loginEmail" required placeholder="you@example.com" class="w-full px-4 py-3 rounded-xl border border-black/20 text-sm focus:outline-none focus:border-black transition-colors">
        </div>

        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="text-xs uppercase tracking-widest text-black/50 block">Password</label>
            <a href="forgot-password.html" class="text-xs underline text-black/60">Forgot?</a>
          </div>
          <div class="relative">
            <input type="password" id="loginPassword" required placeholder="Enter your password" class="w-full px-4 py-3 rounded-xl border border-black/20 text-sm focus:outline-none focus:border-black transition-colors pr-11">
            <button type="button" id="togglePassword" class="eye-icon absolute right-4 top-1/2 -translate-y-1/2 text-black/40 hover:text-black transition">
              <svg id="eyeIcon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </button>
          </div>
        </div>

        <p id="loginError" class="text-xs text-red-500 hidden">Please enter a valid email and password.</p>

        <label class="flex items-center gap-2 text-sm cursor-pointer">
          <input type="checkbox" class="w-4 h-4">
          Remember me for 30 days
        </label>

        <button type="submit" class="w-full bg-black text-white rounded-full py-3.5 uppercase text-sm tracking-widest hover:bg-black/80 transition-all hover:scale-[1.02]">
          Log In
        </button>
      </form>

      <p class="text-center text-sm text-black/60 mt-8 animate-fadeUp delay-2">
        Don't have an account? <a href="signup.html" class="underline font-medium text-black">Sign up</a>
      </p>
    </div>
  </div>
</section>

<script>
  // Password visibility toggle
  const togglePassword = document.getElementById('togglePassword');
  const loginPassword = document.getElementById('loginPassword');
  const eyeIcon = document.getElementById('eyeIcon');

  togglePassword.addEventListener('click', () => {
    const isPassword = loginPassword.type === 'password';
    loginPassword.type = isPassword ? 'text' : 'password';
    eyeIcon.innerHTML = isPassword
      ? '<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />'
      : '<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />';
  });

  // Login form validation (demo)
  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    if (!email.includes('@') || password.length < 4) {
      loginError.classList.remove('hidden');
      loginForm.classList.add('shake');
      setTimeout(() => loginForm.classList.remove('shake'), 400);
      return;
    }

    loginError.classList.add('hidden');
    // In production, this would call your auth API (NextAuth/Auth.js)
    window.location.href = 'dashboard.html';
  });
</script>

</body>
</html>
